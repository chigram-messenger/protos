syntax = "proto3";
package api.chat;
option go_package = "api/proto/chat/chat";
service Chat{
  rpc Get(GetRequest) returns (GetResponse);
  rpc GetAllByID(GetAllByIDRequest) returns (GetAllByIDResponse);
}


message GetRequest{
  repeated int64 user_id = 1;
}
message Message{
  int64 id_sender = 1;
  string name_sender = 2;
  string message = 3;
}
message GetResponse{
  bool is_chat = 1;
  int64 id = 2;
  repeated Message history_messages = 3;
}

message GetAllByIDRequest{
  int64 user_id = 1;
}
message ChatInfo{
  int64 chat_id = 1;
  int64 companion_id = 2;
}
message GetAllByIDResponse{
  repeated ChatInfo chats = 1;
}