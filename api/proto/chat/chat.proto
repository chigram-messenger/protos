syntax = "proto3";
package api;
option go_package = "api/proto/chat";
service ChatService{
  rpc GetChat(GetChatRequest) returns (GetChatResponse);
  rpc GetAllChatsByID(GetAllChatsRequest) returns (GetAllChatsResponse);
}


message GetChatRequest{
  repeated int64 user_id = 1;
}
message Message{
  int64 id_sender = 1;
  string name_sender = 2;
  string message = 3;
}
message GetChatResponse{
  bool is_chat = 1;
  int64 id = 2;
  repeated Message history_messages = 3;
}

message GetAllChatsRequest{
  int64 user_id = 1;
}
message ChatInfo{
  int64 chat_id = 1;
  string chat_name = 2;
}
message GetAllChatsResponse{
  repeated ChatInfo chats = 1;
}